<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>p5.waves Visual Vocabulary</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="identity">
        <span class="mark" aria-hidden="true"></span>
        <div>
          <p class="kicker">p5.waves specimen library</p>
          <h1>Wave behavior as graphic vocabulary</h1>
        </div>
      </div>
      <p class="intro">
        A catalogue of small reusable decisions: one value moves type, gates words,
        activates grids, shifts color, and gives interface states a visible rhythm.
      </p>
    </header>

    <main>
      <section class="control-panel" aria-label="Library controls">
        <div class="search-wrap">
          <label for="search">Search modules</label>
          <input id="search" type="search" placeholder="Try grid, type, status, texture">
        </div>
        <div class="filter-wrap" aria-label="Category filters">
          <button class="filter is-active" type="button" data-filter="all">All</button>
          <button class="filter" type="button" data-filter="motion">Motion</button>
          <button class="filter" type="button" data-filter="type">Type</button>
          <button class="filter" type="button" data-filter="grid">Grid</button>
          <button class="filter" type="button" data-filter="color">Color</button>
          <button class="filter" type="button" data-filter="texture">Texture</button>
          <button class="filter" type="button" data-filter="interface">Interface</button>
          <button class="filter" type="button" data-filter="state">State</button>
          <button class="filter" type="button" data-filter="layout">Layout</button>
        </div>
      </section>

      <section class="library-summary" aria-label="Current wave state">
        <div>
          <span class="summary-label">Active primitive</span>
          <strong id="activePrimitive">Waves.wave()</strong>
        </div>
        <div>
          <span class="summary-label">Visible modules</span>
          <strong id="visibleCount">28</strong>
        </div>
        <div>
          <span class="summary-label">Vocabulary focus</span>
          <strong id="focusLabel">micro-decisions</strong>
        </div>
      </section>

      <section id="library" class="library-grid" aria-live="polite"></section>
    </main>

    <template id="cardTemplate">
      <article class="module-card">
        <div class="card-head">
          <div>
            <p class="category"></p>
            <h2></h2>
          </div>
          <button class="copy-button" type="button">Copy</button>
        </div>
        <p class="role"></p>
        <canvas width="620" height="320"></canvas>
        <div class="meta-row"></div>
        <p class="notes"></p>
        <pre><code></code></pre>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
